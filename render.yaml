# Render Blueprint — API only (frontend on Vercel).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: videodb-play-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: VIDEO_DB_API_KEY
        sync: false
      - key: VIDEODB_COLLECTION_ID
        sync: false
      - key: VIDEODB_COLLECTION_NAME
        value: new collection
      - key: VIDEODB_MEDIA_MODE
        value: economy
      - key: VIDEODB_RECAP
        value: local
      - key: VIDEODB_SANDBOX_TIER
        value: medium
      - key: SERVE_STATIC
        value: "false"
      - key: SANDBOX_ASYNC_FLUX
        value: "true"
      - key: RENDER
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      # Set after Vercel deploy, e.g. https://your-app.vercel.app
      # Comma-separated for multiple origins.
