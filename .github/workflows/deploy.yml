# Git deployment: push to main → test & build → optional hooks → smoke test.
# Render + Vercel also auto-deploy when each service is linked to this repo on GitHub.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  VIDEODB_API_BASE: https://videodb-play-api.onrender.com
  PROD_API: https://videodb-play-api.onrender.com
  PROD_ORIGIN: https://videodb-games-theme.vercel.app

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Import app modules
        run: python3 -c "from app import main, sandbox_game; print('imports ok')"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Vercel frontend
        run: node scripts/build-vercel-frontend.js

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  trigger-render:
    name: Trigger Render API deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Render deploy hook (optional)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK"
            echo "Render deploy hook triggered."
          else
            echo "No RENDER_DEPLOY_HOOK — Render deploys from Git when linked in render.com."
            echo "API: https://videodb-play-api.onrender.com"
          fi

  deploy-vercel:
    name: Deploy frontend (Vercel CLI)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VIDEODB_API_BASE: ${{ env.VIDEODB_API_BASE }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not set — frontend deploys from Git on vercel.com."
            echo "https://videodb-games-theme.vercel.app"
            exit 0
          fi
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  smoke-test:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: [test, trigger-render]
    if: github.ref == 'refs/heads/main' && needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for Render rollout
        run: sleep 90

      - name: Validate production API
        run: python3 scripts/validate_production.py
        continue-on-error: true
